<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorry Navrose ❤️</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    .text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff8fcf;
      font-size: 42px;
      font-weight: bold;
      text-shadow:
        0 0 10px #ff4da6,
        0 0 20px #ff4da6,
        0 0 40px #ff4da6;
      opacity: 0;
      animation: fadeIn 3s ease forwards;
      animation-delay: 3s;
      z-index: 2;
      text-align: center;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.8);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite ease-in-out;
      opacity: 0.8;
    }

    @keyframes twinkle {
      0%, 100% { transform: scale(0.5); opacity: 0.2; }
      50% { transform: scale(1.5); opacity: 1; }
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="text">Sorry Navrose ❤️</div>

<script>
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = [];
  const total = 1200;

  function heart(t) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y =
      13 * Math.cos(t) -
      5 * Math.cos(2 * t) -
      2 * Math.cos(3 * t) -
      Math.cos(4 * t);
    return { x, y };
  }

  for (let i = 0; i < total; i++) {
    let t = Math.random() * Math.PI * 2;
    let pos = heart(t);

    particles.push({
      x: canvas.width / 2,
      y: canvas.height / 2,
      tx: canvas.width / 2 + pos.x * 20,
      ty: canvas.height / 2 - pos.y * 20,
      size: Math.random() * 2 + 1,
      speed: Math.random() * 0.03 + 0.01
    });
  }

  let pulse = 1;

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    pulse += 0.02;
    let scale = 1 + Math.sin(pulse) * 0.05;

    particles.forEach(p => {
      p.x += (p.tx * scale - p.x) * p.speed;
      p.y += (p.ty * scale - p.y) * p.speed;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,105,180,0.9)";
      ctx.shadowColor = "#ff69b4";
      ctx.shadowBlur = 12;
      ctx.fill();
    });

    requestAnimationFrame(animate);
  }

  animate();

  // Sparkles
  for (let i = 0; i < 60; i++) {
    const s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random() * window.innerWidth + "px";
    s.style.top = Math.random() * window.innerHeight + "px";
    s.style.animationDelay = Math.random() * 3 + "s";
    document.body.appendChild(s);
  }

  window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
</script>

</body>
</html>
